name: Playwright Tests
on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Select Test Suite to Run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - regression
          - full
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      BEFFA_USER: ${{ secrets.BEFFA_USER }}
      BEFFA_PASS: ${{ secrets.BEFFA_PASS }}

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # LTS version recommended
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Get installed Playwright version
      id: playwright-version
      run: echo "PLAYWRIGHT_VERSION=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_ENV

    - name: Cache playwright binaries
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: |
          ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

    - name: Install Playwright Browsers & Deps
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install chromium --with-deps

    - name: Install Playwright OS Dependencies
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps chromium
    - name: Run Playwright tests
      run: |
        if [ "${{ github.event.inputs.test_type }}" == "smoke" ] || [ "${{ github.event_name }}" == "push" ] || [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "Executing Smoke Suite (@smoke)..."
          npx playwright test --project=Inventory --project=Purchases --project=Sales --grep @smoke
        elif [ "${{ github.event.inputs.test_type }}" == "regression" ]; then
          echo "Executing Regression Suite (@regression)..."
          npx playwright test --project=Inventory --project=Purchases --project=Sales --grep @regression
        else
          echo "Executing Full Suite (All Tests)..."
          npx playwright test --project=Inventory --project=Purchases --project=Sales
        fi
    - name: Get Allure history
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Setup Java for Allure
      uses: actions/setup-java@v3
      if: always()
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Generate Allure Report
      if: always()
      run: |
        # Copy history from previous gh-pages branch to allure-results so trends are kept
        mkdir -p allure-results/history
        cp -r gh-pages/history/. allure-results/history/ || true
        # Generate the report
        npx allure generate allure-results --clean -o allure-report
        # Create history directory in the report for the next run
        mkdir -p allure-report/history
        cp -r allure-report/history/. allure-results/history/ || true

    - name: Deploy Allure Report to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: allure-report
        publish_branch: gh-pages
        
    - name: Ensure custom domain is preserved (if any)
      if: always()
      run: |
        echo "Report should be visible at https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

    - name: Upload Test Results Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ github.run_id }}
        path: |
          playwright-report/
          allure-results/
          allure-report/
        retention-days: 7
