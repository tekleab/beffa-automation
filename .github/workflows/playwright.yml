name: Playwright Tests
on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Select Test Suite to Run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - regression
          - full
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      BEFFA_USER: ${{ secrets.BEFFA_USER }}
      BEFFA_PASS: ${{ secrets.BEFFA_PASS }}

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # LTS version recommended
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers & Deps
      run: npx playwright install chromium --with-deps

    - name: Run Playwright tests
      run: |
        if [ "${{ github.event.inputs.test_type }}" == "smoke" ] || [ "${{ github.event_name }}" == "push" ] || [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "Executing Smoke Suite (@smoke)..."
          npx playwright test --project=Inventory --project=Purchases --project=Sales --grep @smoke
        elif [ "${{ github.event.inputs.test_type }}" == "regression" ]; then
          echo "Executing Regression Suite (@regression)..."
          npx playwright test --project=Inventory --project=Purchases --project=Sales --grep @regression
        else
          echo "Executing Full Suite (All Tests)..."
          npx playwright test --project=Inventory --project=Purchases --project=Sales
        fi
      continue-on-error: true # Keep going to generate report even if tests fail

    - name: Get Allure history
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Allure Report action
      uses: simple-elf/allure-report-action@v1.9
      if: always()
      id: allure-report
      with:
        allure_results: allure-results
        gh_pages: gh-pages
        allure_report: allure-report
        allure_history: allure-history

    - name: Deploy Allure Report to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: allure-history
        publish_branch: gh-pages
        
    - name: Ensure custom domain is preserved (if any)
      if: always()
      run: |
        # If there's a custom domain or specific gh-pages setup needed, add it here.
        # For default github pages, simple-elf and peaceiris handle the branch updating nicely.
        echo "Report should be visible at https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

    - name: Upload Test Results Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ github.run_id }}
        path: |
          playwright-report/
          allure-results/
          allure-report/
        retention-days: 7
