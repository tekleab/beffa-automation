name: Playwright Tests
on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Select Test Suite to Run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - regression
          - full
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      BEFFA_USER: ${{ secrets.BEFFA_USER }}
      BEFFA_PASS: ${{ secrets.BEFFA_PASS }}

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # LTS version recommended
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Get installed Playwright version
      id: playwright-version
      run: echo "PLAYWRIGHT_VERSION=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_ENV

    - name: Cache playwright binaries
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: |
          ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

    - name: Install Playwright Browsers & Deps
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install chromium --with-deps

    - name: Install Playwright OS Dependencies
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps chromium
    - name: Run Playwright tests
      run: |
        if [ "${{ github.event_name }}" == "push" ] || [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "Executing Smoke Suite (@smoke) for automated push/PR..."
          npx playwright test --project=Inventory --project=Purchases --project=Sales --grep @smoke
        elif [ "${{ github.event.inputs.test_type }}" == "smoke" ]; then
          echo "Executing Manual Smoke Suite (@smoke)..."
          npx playwright test --project=Inventory --project=Purchases --project=Sales --grep @smoke
        elif [ "${{ github.event.inputs.test_type }}" == "regression" ]; then
          echo "Executing Manual Regression Suite (@regression)..."
          npx playwright test --project=Inventory --project=Purchases --project=Sales --grep @regression
        else
          echo "Executing Manual Full Suite (All Tests)..."
          npx playwright test --project=Inventory --project=Purchases --project=Sales
        fi
    - name: Get Allure history
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Generate Allure Executor Info
      if: always()
      run: |
        mkdir -p allure-results
        echo '{
          "name": "GitHub Actions",
          "type": "github",
          "url": "https://github.com/tekleab/beffa-automation/actions/runs/${{ github.run_id }}",
          "buildOrder": "${{ github.run_id }}",
          "buildName": "Playwright Tests #${{ github.run_id }}",
          "buildUrl": "https://github.com/tekleab/beffa-automation/actions/runs/${{ github.run_id }}"
        }' > allure-results/executor.json

    - name: Setup Java for Allure
      uses: actions/setup-java@v3
      if: always()
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Generate Allure Report
      if: always()
      run: |
        # 1. Deep Clean results (keep only current run + executor)
        mkdir -p allure-results/history
        
        # 2. Sync history from gh-pages with defensive check
        if [ -d "gh-pages/allure/history" ]; then
          echo "[INFO] Syncing Allure History..."
          cp -r gh-pages/allure/history/. allure-results/history/ || true
        else
          echo "[WARN] No previous history found."
        fi
        
        # 3. Generate the report with absolute clean
        npx allure generate allure-results --clean -o allure-report
        
        # 4. Update Latency History Trend
        node scripts/latency-tracker.js

        # 5. Ensure report is fully static
        mkdir -p allure-report/history
    - name: Finalize Astonishing Reporting Suite
      if: always()
      run: |
        # Create a clean deployment directory if not there
        mkdir -p deploy
        # Move standard Allure report to a sub-folder inside deploy
        # The reporter already generated the Dynamic index.html in deploy/
        mv allure-report deploy/allure || true
        # Update summary for CI logs
        echo "Primary Dashboard: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY
        echo "Detailed Allure: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/allure/" >> $GITHUB_STEP_SUMMARY

    - name: Deploy to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: deploy
        publish_branch: gh-pages
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'

    - name: Upload Test Results Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ github.run_id }}
        path: |
          playwright-report/
          allure-results/
          deploy/
        retention-days: 7
