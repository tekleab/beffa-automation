name: Playwright Tests
on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Select Test Suite to Run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - regression
          - full

# 🛡️ ሪፖርቱን ለመጻፍ የሚያስፈልግ ፈቃድ
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 45 
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      BASE_URL: ${{ secrets.BASE_URL }}
      BEFFA_USER: ${{ secrets.BEFFA_USER }}
      BEFFA_PASS: ${{ secrets.BEFFA_PASS }}

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers & Deps
      run: npx playwright install chromium --with-deps

    - name: Run Playwright tests
      run: |
        if [ "${{ github.event.inputs.test_type }}" == "smoke" ]; then
          echo "Executing Smoke Suite (@smoke)..."
          npx playwright test --project=Inventory --project=Purchases --project=Sales --grep @smoke
        elif [ "${{ github.event.inputs.test_type }}" == "regression" ]; then
          echo "Executing Regression Suite (@regression)..."
          npx playwright test --project=Inventory --project=Purchases --project=Sales --grep @regression
        else
          echo "Executing Full Suite (All Tests)..."
          npx playwright test --project=Inventory --project=Purchases --project=Sales
        fi
      continue-on-error: true # 🚨 ቴስት ቢወድቅም ሪፖርቱ እንዲሰራ ይሄ አስፈላጊ ነው

    # 📊 ALLURE MAGIC STARTS HERE
    - name: Load Allure history
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Build Allure Report
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: allure-results
        allure_history: allure-history
        keep_histories: 20

    - name: Deploy Allure Report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: allure-history
        publish_branch: gh-pages

    - name: Upload Artifacts (Backup)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ github.run_id }}
        path: |
          playwright-report/
          allure-results/
          allure-report/
        retention-days: 7
