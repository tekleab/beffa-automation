name: Playwright Tests
on:
  # Manual trigger only - no auto-run on push
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Select Test Suite to Run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - regression
          - full

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 45 
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      BASE_URL: ${{ secrets.BASE_URL }}
      BEFFA_USER: ${{ secrets.BEFFA_USER }}
      BEFFA_PASS: ${{ secrets.BEFFA_PASS }}

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers & Deps
      run: npx playwright install chromium --with-deps

    - name: Run Playwright tests
      run: |
        if [ "${{ github.event.inputs.test_type }}" == "smoke" ]; then
          echo "Executing Smoke Suite (@smoke)..."
          npx playwright test --grep @smoke
        elif [ "${{ github.event.inputs.test_type }}" == "regression" ]; then
          echo "Executing Regression Suite (@regression)..."
          npx playwright test --grep @regression
        else
          echo "Executing Full Suite (All Tests)..."
          npx playwright test
        fi

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ github.run_id }}
        path: |
          playwright-report/
          allure-results/
          allure-report/
        retention-days: 7
