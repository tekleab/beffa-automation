name: Playwright Tests
on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test Suite to Run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - regression
          - full
      company:
        description: 'Company'
        required: true
        default: 'sample'
        type: choice
        options:
          - 'sample'
          - 'sample'
          - 'bm technology'
          - 'development'
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      BEFFA_USER: ${{ secrets.BEFFA_USER }}
      BEFFA_PASS: ${{ secrets.BEFFA_PASS }}
      # Priority: manual input > repo secret > hardcoded default
      # Priority: manual input (if dispatch) > repo secret > hardcoded default
      BEFFA_COMPANY: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.company) || secrets.BEFFA_COMPANY || 'sample' }}
      BEFFA_YEAR: ${{ secrets.BEFFA_YEAR || '2018' }}
      BEFFA_PERIOD: ${{ secrets.BEFFA_PERIOD || 'yearly' }}
      BEFFA_CALENDAR: ${{ secrets.BEFFA_CALENDAR || 'ec' }}

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # LTS version recommended
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Get installed Playwright version
      id: playwright-version
      run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

    - name: Cache playwright binaries
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: |
          ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

    - name: Install Playwright Browsers & Deps
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install chromium --with-deps

    - name: Install Playwright OS Dependencies
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps chromium

    - name: Run Playwright tests
      if: always()
      continue-on-error: true
      run: |
        if [ "${{ github.event_name }}" == "push" ] || [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "Executing Smoke Suite (@smoke) for automated push/PR..."
          npx playwright test --project=Inventory --project=Purchases --project=Sales --grep @smoke
        elif [ "${{ github.event.inputs.test_type }}" == "smoke" ]; then
          echo "Executing Manual Smoke Suite (@smoke)..."
          npx playwright test --project=Inventory --project=Purchases --project=Sales --grep @smoke
        elif [ "${{ github.event.inputs.test_type }}" == "regression" ]; then
          echo "Executing Manual Regression Suite (@regression)..."
          npx playwright test --project=Inventory --project=Purchases --project=Sales --grep @regression
        else
          echo "Executing Manual Full Suite (All Tests)..."
          npx playwright test --project=Inventory --project=Purchases --project=Sales
        fi
    - name: Get Allure history
      uses: actions/checkout@v4
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Generate Allure Executor Info
      if: always()
      run: |
        mkdir -p allure-results
        echo '{
          "name": "GitHub Actions",
          "type": "github",
          "url": "https://github.com/tekleab/beffa-automation/actions/runs/${{ github.run_id }}",
          "buildOrder": "${{ github.run_id }}",
          "buildName": "Playwright Tests #${{ github.run_id }}",
          "buildUrl": "https://github.com/tekleab/beffa-automation/actions/runs/${{ github.run_id }}"
        }' > allure-results/executor.json

    - name: Setup Java for Allure
      uses: actions/setup-java@v3
      if: always()
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Generate Allure Report
      if: always()
      run: |
        # 1. Prepare history baseline
        mkdir -p allure-results/history
        if [ -d "gh-pages/allure/history" ]; then
          echo "[INFO] Syncing Allure History..."
          cp -r gh-pages/allure/history/. allure-results/history/ || true
        fi
        
        # 2. Generate report to TEMP location
        npx allure generate allure-results --clean -o temp-report
        
        # 3. Update Latency History Trend
        npx ts-node scripts/latency-tracker.ts || true

    - name: Finalize & Deploy Preparation
      if: always()
      run: |
        # Create a clean deployment directory
        mkdir -p deploy
        
        # 🏙️ FORCED DASHBOARD GENERATION
        echo "[INFO] Generating Integrated Dashboard..."
        npx ts-node -e "import { IntegratedDashboard } from './reporters/integrated-dashboard'; new IntegratedDashboard().onEnd({ status: 'passed' } as any)" || true
        
        # ATOMIC MOVE: Ensure all data folders (test-cases, attachments) are moved
        if [ -d "temp-report" ]; then
          mv temp-report deploy/allure
          echo "[SUCCESS] Allure report finalized in deploy/allure"
        else
          echo "[ERROR] temp-report not found. Check generate step."
        fi

        # 🔐 SECURITY & VISIBILITY SENTRY: Inject Auth Check and Auto-Filter into Allure sub-report
        if [ -f "deploy/allure/index.html" ]; then
          sed -i 's|<head>|<head><script>if(sessionStorage.getItem("beffa_auth")!=="true"){window.location.href="../";} localStorage.setItem("allure-playwright-marks", JSON.stringify({failed:true,broken:true,passed:true,skipped:true,unknown:true}));</script>|' deploy/allure/index.html
        fi
        
        # Update summary for CI logs
        echo "Primary Dashboard: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY
        echo "Detailed Allure: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/allure/" >> $GITHUB_STEP_SUMMARY

    - name: Deploy to GitHub Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: deploy
        publish_branch: gh-pages
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'

    - name: Upload Test Results Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ github.run_id }}
        path: |
          playwright-report/
          allure-results/
          deploy/
        retention-days: 7
